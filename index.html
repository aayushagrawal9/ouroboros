---
layout: page
title: Home
---

{{ site.description }}
<hr>

<div class="posts">
  {% for post in site.posts %}
  <div class="post">
    <h1 class="post-title">
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </h1>

    <span class="post-date">{{ post.date | date_to_string }}</span>

    {{ post.description | markdownify }}
  </div>
  {% endfor %}
</div>
